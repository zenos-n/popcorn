name: Popcorn Nightly

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── 1. Detect which variants actually need rebuilding ─────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.scan.outputs.should_build }}
      matrix_generic: ${{ steps.scan.outputs.matrix_generic }}
      matrix_rest: ${{ steps.scan.outputs.matrix_rest }}
      has_generic: ${{ steps.scan.outputs.has_generic }}
      has_rest: ${{ steps.scan.outputs.has_rest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Scan changed files
        id: scan
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if ! echo "$CHANGED" | grep -qE '^(scripts/.+\.nix|flake\.nix|\.github/workflows/nightly\.yml)$'; then
            echo "No relevant files changed — skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo 'matrix_generic={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'matrix_rest={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "has_generic=false" >> "$GITHUB_OUTPUT"
            echo "has_rest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED" | grep -qE '^(flake\.nix|\.github/workflows/nightly\.yml)$'; then
            echo "Core configuration changed — rebuilding all variants."
            VARIANTS=$(find scripts -name '*.nix' \
              | sed 's|scripts/||; s|/|-|; s|\.nix$||')
          else
            VARIANTS=$(echo "$CHANGED" \
              | grep '^scripts/.*\.nix$' \
              | sed 's|scripts/||; s|/|-|; s|\.nix$||')
          fi

          VARIANTS=$(echo "$VARIANTS" | grep -v '\-release$')

          echo "All variants to build: $VARIANTS"

          GENERICS=$(echo "$VARIANTS" | grep    '\-generic$' || true)
          REST=$(echo      "$VARIANTS" | grep -v '\-generic$' | grep -v '^$' || true)

          echo "Generic variants: $GENERICS"
          echo "Rest variants:    $REST"

          INCLUDES_G=$(echo "$GENERICS" | grep -v '^$' \
            | awk '{printf "%s{\"variant\":\"%s\"}", (NR>1?",":""), $0}')
          echo "matrix_generic={\"include\":[$INCLUDES_G]}" >> "$GITHUB_OUTPUT"
          [ -n "$INCLUDES_G" ] \
            && echo "has_generic=true"  >> "$GITHUB_OUTPUT" \
            || echo "has_generic=false" >> "$GITHUB_OUTPUT"

          INCLUDES_R=$(echo "$REST" | grep -v '^$' \
            | awk '{printf "%s{\"variant\":\"%s\"}", (NR>1?",":""), $0}')
          echo "matrix_rest={\"include\":[$INCLUDES_R]}" >> "$GITHUB_OUTPUT"
          [ -n "$INCLUDES_R" ] \
            && echo "has_rest=true"  >> "$GITHUB_OUTPUT" \
            || echo "has_rest=false" >> "$GITHUB_OUTPUT"

  # ── 2. Archive the current nightly before overwriting it ──────────────────
  archive_nightly:
    needs: detect
    if: ${{ needs.detect.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Archive current nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          if ! gh release view nightly --repo "$REPO" > /dev/null 2>&1; then
            echo "No existing nightly release — nothing to archive."
            exit 0
          fi

          mkdir -p archive-assets
          gh release download nightly --repo "$REPO" --dir archive-assets 2>/dev/null || true

          if [ -z "$(ls archive-assets/*.zip 2>/dev/null)" ]; then
            echo "Nightly has no assets — just clearing it."
            gh release delete nightly --repo "$REPO" --yes --cleanup-tag
            exit 0
          fi

          ZIP=$(ls archive-assets/*.zip | head -1)

          # strips out both old (Popcorn-6.18.25-Popcorn-) and new formats cleanly
          VERSION=$(basename "$ZIP" .zip | sed -E 's/^Popcorn-//; s/^[0-9]+\.[0-9]+\.[0-9]+-Popcorn-//')
          ARCHIVE_TAG="archive-${VERSION}"

          echo "Archiving as: $ARCHIVE_TAG"

          gh release create "$ARCHIVE_TAG" \
            --repo "$REPO" \
            --title "Archive: ${VERSION}" \
            --notes "Archived nightly snapshot — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --prerelease \
            archive-assets/*.zip

          gh release delete nightly --repo "$REPO" --yes --cleanup-tag

  # ── 3. Build Generic Variants ─────────────────────────────────────────────
  build_generic:
    needs: detect
    if: ${{ needs.detect.outputs.has_generic == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix_generic) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Kernel and Modules
        run: |
          nix build .#${{ matrix.variant }} --out-link result-kernel --print-build-logs
          nix build .#${{ matrix.variant }}.modules --out-link result-modules --print-build-logs

      - name: Package Artifacts
        id: package
        run: |
          FULL_VERSION=$(nix eval .#${{ matrix.variant }}.version --raw)

          if [ -z "$FULL_VERSION" ]; then
              FULL_VERSION="${{ matrix.variant }}-$(git rev-parse --short HEAD)"
          fi

          # strip out the x.x.x kernel version prefix entirely
          CLEAN_VERSION=$(echo "$FULL_VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-//')
          ZIP_NAME="Popcorn-${CLEAN_VERSION#Popcorn-}.zip"

          mkdir -p staging
          find -L result-kernel -name "bzImage" -type f -exec cp -L {} staging/ \;
          find -L result-kernel -name "System.map" -type f -exec cp -L {} staging/ \;

          MOD_DIR=$(find -L . -path "*/lib/modules/*" -type d | head -n 1)
          if [ -n "$MOD_DIR" ]; then
              mkdir -p staging/lib/modules
              cp -rL "$MOD_DIR" staging/lib/modules/
          fi

          cd staging
          zip -r9 "../$ZIP_NAME" ./*
          cd ..

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: "*.zip"

  # ── 4. Release Generic Variants ───────────────────────────────────────────
  release_generic:
    needs: [build_generic, archive_nightly]
    if: ${{ always() && needs.detect.outputs.has_generic == 'true' && needs.archive_nightly.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Popcorn*
          merge-multiple: true

      - name: Publish Generic Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: "Popcorn Nightly Build"
          prerelease: true
          files: artifacts/*.zip

  # ── 5. Build Rest Variants ────────────────────────────────────────────────
  build_rest:
    needs: [detect, release_generic, archive_nightly]
    if: ${{ always() && needs.detect.outputs.has_rest == 'true' && needs.archive_nightly.result != 'failure' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix_rest) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Kernel and Modules
        run: |
          nix build .#${{ matrix.variant }} --out-link result-kernel --print-build-logs
          nix build .#${{ matrix.variant }}.modules --out-link result-modules --print-build-logs

      - name: Package Artifacts
        id: package
        run: |
          FULL_VERSION=$(nix eval .#${{ matrix.variant }}.version --raw)

          if [ -z "$FULL_VERSION" ]; then
              FULL_VERSION="${{ matrix.variant }}-$(git rev-parse --short HEAD)"
          fi

          # strip out the x.x.x kernel version prefix entirely
          CLEAN_VERSION=$(echo "$FULL_VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-//')
          ZIP_NAME="Popcorn-${CLEAN_VERSION#Popcorn-}.zip"

          mkdir -p staging
          find -L result-kernel -name "bzImage" -type f -exec cp -L {} staging/ \;
          find -L result-kernel -name "System.map" -type f -exec cp -L {} staging/ \;

          MOD_DIR=$(find -L . -path "*/lib/modules/*" -type d | head -n 1)
          if [ -n "$MOD_DIR" ]; then
              mkdir -p staging/lib/modules
              cp -rL "$MOD_DIR" staging/lib/modules/
          fi

          cd staging
          zip -r9 "../$ZIP_NAME" ./*
          cd ..

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: "*.zip"

  # ── 6. Release Final Variants ─────────────────────────────────────────────
  release_final:
    needs: build_rest
    if: ${{ always() && needs.detect.outputs.has_rest == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Popcorn*
          merge-multiple: true

      - name: Publish Final Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: "Popcorn Nightly Build"
          prerelease: true
          files: artifacts/*.zip
